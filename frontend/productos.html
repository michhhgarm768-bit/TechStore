<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Productos - TechStore</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>

<div class="container mt-4">

    <h1 class="text-center mb-4">
        Gestión de Productos
    </h1>

    <div class="card p-3 mb-4">

        <h4>Agregar Producto</h4>

        <input type="text" id="nombre" class="form-control mb-2" placeholder="Nombre">

        <input type="text" id="descripcion" class="form-control mb-2" placeholder="Descripción">

        <input type="number" id="precio" class="form-control mb-2" placeholder="Precio">

        <input type="number" id="stock" class="form-control mb-2" placeholder="Stock">

        <button class="btn btn-success" onclick="guardarProducto()">
            Guardar
        </button>
        

    </div>

    <table class="table table-bordered">

        <thead>
            <tr>
                <th>Nombre</th>
                <th>Descripción</th>
                <th>Precio</th>
                <th>Stock</th>
                <th>Acciones</th>
            </tr>
        </thead>

        <tbody id="tablaProductos">

        </tbody>

    </table>

</div>

<script src="js/productos.js"></script>

</body>
</html>

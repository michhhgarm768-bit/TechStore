<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>TechStore</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background-color:#f4f6f9;
}

.hero{
    text-align:center;
    padding:50px;
}

.card-menu{
    transition:0.3s;
}

.card-menu:hover{
    transform:scale(1.05);
}

</style>

</head>
<body>

<div class="container">

    <div class="hero">

        <h1 class="display-4">
            🛒 TechStore
        </h1>

        <p class="lead">
            Bienvenido al Sistema Web de Gestión de Ventas
        </p>

        <div class="mt-4">

            <a href="login.html" class="btn btn-primary me-2">
                Iniciar Sesión
            </a>
            
            <a href="registro.html" class="btn btn-outline-success">
                Registrarse
            </a>

        </div>

    </div>

    <hr>

    <h2 class="text-center mb-4">
        Menú Principal
    </h2>

    <div class="row">

        <div class="col-md-3 mb-3">

            <div class="card card-menu shadow">

                <div class="card-body text-center">

                    <h3>📦</h3>

                    <h5>Productos</h5>

                    <a href="productos.html"
                       class="btn btn-primary w-100">
                       Entrar
                    </a>

                </div>

            </div>

        </div>

        <div class="col-md-3 mb-3">

            <div class="card card-menu shadow">

                <div class="card-body text-center">

                    <h3>👥</h3>

                    <h5>Clientes</h5>

                    <a href="clientes.html"
                       class="btn btn-success w-100">
                       Entrar
                    </a>

                </div>

            </div>

        </div>

        <div class="col-md-3 mb-3">

            <div class="card card-menu shadow">

                <div class="card-body text-center">

                    <h3>💰</h3>

                    <h5>Ventas</h5>

                    <a href="ventas.html"
                       class="btn btn-warning w-100">
                       Entrar
                    </a>

                </div>

            </div>

        </div>

        <div class="col-md-3 mb-3">

            <div class="card card-menu shadow">

                <div class="card-body text-center">

                    <h3>📊</h3>

                    <h5>Reportes</h5>

                    <a href="reportes.html"
                       class="btn btn-danger w-100">
                       Entrar
                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>

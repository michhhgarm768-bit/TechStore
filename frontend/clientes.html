<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Clientes - TechStore</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>

<div class="container mt-4">

    <h1 class="text-center mb-4">
        Gestión de Clientes
    </h1>

    <div class="card p-3 mb-4">

        <h4>Agregar Cliente</h4>

        <input type="text" id="nombre" class="form-control mb-2" placeholder="Nombre">

        <input type="text" id="telefono" class="form-control mb-2" placeholder="Teléfono">

        <input type="email" id="correo" class="form-control mb-2" placeholder="Correo">

        <button class="btn btn-success" onclick="guardarCliente()">
            Guardar
        </button>

    </div>

    <table class="table table-bordered">

        <thead>
            <tr>
                <th>Nombre</th>
                <th>Teléfono</th>
                <th>Correo</th>
                <th>Acciones</th>
            </tr>
        </thead>

        <tbody id="tablaClientes">

        </tbody>

    </table>

</div>

<script src="js/clientes.js"></script>

</body>
</html>

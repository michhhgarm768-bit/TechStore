<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Ventas - TechStore</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>

<div class="container mt-4">

    <h1 class="text-center mb-4">
        Gestión de Ventas
    </h1>

    <div class="card p-3 mb-4">

        <h4>Registrar Venta</h4>

        <input type="text" id="cliente" class="form-control mb-2" placeholder="Cliente">

        <input type="number" id="total" class="form-control mb-2" placeholder="Total">

        <input
    type="text"
    id="producto"
    class="form-control mb-2"
    placeholder="Producto">

        <button class="btn btn-success" onclick="guardarVenta()">
            Guardar
        </button>

    </div>

    <table class="table table-bordered">

        <thead>
            <tr>
                <th>Cliente</th>
                <th>Total</th>
            </tr>
        </thead>

        <tbody id="tablaVentas">

        </tbody>

    </table>

</div>

<div class="card p-3 mt-4">

    <h3>Ticket de Venta</h3>

    <div id="ticket">

        <p>No hay ticket generado.</p>

    </div>

    <button class="btn btn-primary mt-3" onclick="imprimirTicket()">
        🖨 Imprimir Ticket
    </button>

</div>

<script src="js/ventas.js"></script>

</body>
</html>
